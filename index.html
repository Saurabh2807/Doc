<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DocQueue — Find Doctors, Skip the Wait</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  <link rel="stylesheet" href="styles.css">
  <div class="fi" style="text-align:center;margin-bottom:48px;">
    <div style="width:72px;height:72px;border-radius:22px;background:linear-gradient(135deg,#2563EB,#0284C7);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 12px 40px rgba(37,99,235,0.3);">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3"/><path d="M8 15v1a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6v-4"/><circle cx="20" cy="10" r="2"/></svg>
    </div>
    <h1 style="font-size:38px;font-weight:900;color:#0F172A;letter-spacing:-1.5px;">Doc<span style="color:#2563EB;">Queue</span></h1>
    <p style="color:#64748B;margin-top:8px;font-size:16px;">Find doctors. Skip the wait.</p>
  </div>

  <div style="width:100%;max-width:380px;display:flex;flex-direction:column;gap:14px;">
    <!-- Patient Card -->
    <div class="card clickable fu d1" style="padding:26px;border-radius:22px;" onclick="goPatient()">
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:14px;">
        <div style="width:54px;height:54px;border-radius:16px;background:linear-gradient(135deg,#DBEAFE,#EFF6FF);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div style="flex:1;">
          <h2 style="font-size:18px;font-weight:800;color:#0F172A;margin-bottom:3px;">I'm a Patient</h2>
          <p style="font-size:13px;color:#64748B;line-height:1.5;">Find nearby doctors, check live queue & book slots</p>
        </div>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div style="display:flex;gap:7px;flex-wrap:wrap;">
        <span style="background:#EFF6FF;color:#2563EB;font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;">🔍 Discover</span>
        <span style="background:#F0FDF4;color:#16A34A;font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;">⏱ Live Queue</span>
        <span style="background:#FDF4FF;color:#9333EA;font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;">📅 Book</span>
      </div>
    </div>

    <!-- Doctor Card -->
    <div class="card clickable fu d2" style="padding:26px;border-radius:22px;border-color:#0284C7;" onclick="goDocLogin()">
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:14px;">
        <div style="width:54px;height:54px;border-radius:16px;background:linear-gradient(135deg,#CCFBF1,#F0FDFA);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#0D9488" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3"/><path d="M8 15v1a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6v-4"/><circle cx="20" cy="10" r="2"/></svg>
        </div>
        <div style="flex:1;">
          <h2 style="font-size:18px;font-weight:800;color:#0F172A;margin-bottom:3px;">I'm a Doctor</h2>
          <p style="font-size:13px;color:#64748B;line-height:1.5;">Manage clinic queue, appointments & availability</p>
        </div>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div style="display:flex;gap:7px;flex-wrap:wrap;">
        <span style="background:#CCFBF1;color:#0D9488;font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;">📊 Dashboard</span>
        <span style="background:#FEF9C3;color:#CA8A04;font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;">👥 Queue Mgmt</span>
        <span style="background:#DBEAFE;color:#2563EB;font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;">📋 Patients</span>
      </div>
    </div>
  </div>
  <p style="color:#CBD5E1;font-size:12px;margin-top:36px;">DocQueue v1.0 · Made with ❤️ in India</p>
</div>
</div>

<!-- ═══════════════════════════════════════
     SCREEN 2: DOCTOR LOGIN
═══════════════════════════════════════ -->
<div class="screen" id="s-doclogin">
<div class="doc-login-bg">
  <button onclick="goScreen('s-landing')" style="position:absolute;top:20px;left:16px;background:rgba(255,255,255,0.10);border:1px solid rgba(255,255,255,0.18);color:white;border-radius:12px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;">
    ← Back
  </button>

  <div style="width:100%;max-width:380px;">
    <div class="fi" style="text-align:center;margin-bottom:32px;">
      <div style="width:62px;height:62px;border-radius:18px;background:rgba(255,255,255,0.10);border:1px solid rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <h1 style="font-size:26px;font-weight:900;color:white;margin-bottom:6px;">Doctor Login</h1>
      <p style="color:rgba(255,255,255,0.55);font-size:14px;">Access your clinic dashboard</p>
    </div>

    <div class="glass fu" style="padding:26px;margin-bottom:14px;">
      <div style="margin-bottom:14px;">
        <label style="display:block;font-size:11px;font-weight:700;color:rgba(255,255,255,0.65);margin-bottom:7px;text-transform:uppercase;letter-spacing:0.06em;">Registration ID</label>
        <input id="docRegId" type="text" value="MCI-DL-2024-0042" class="inp" style="background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);color:white;" placeholder="MCI-DL-XXXX-XXXX"/>
      </div>
      <div style="margin-bottom:22px;">
        <label style="display:block;font-size:11px;font-weight:700;color:rgba(255,255,255,0.65);margin-bottom:7px;text-transform:uppercase;letter-spacing:0.06em;">Password</label>
        <div style="position:relative;">
          <input id="docPwd" type="password" value="password123" class="inp" style="background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);color:white;padding-right:46px;" placeholder="••••••••"/>
          <button onclick="togglePwd()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.45);font-size:16px;">👁</button>
        </div>
      </div>
      <button onclick="doDocLogin()" id="loginBtn" class="btn btn-blue">Sign In to Dashboard</button>
    </div>

    <div style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.10);border-radius:16px;padding:16px;margin-bottom:14px;text-align:center;">
      <p style="color:rgba(255,255,255,0.45);font-size:12px;margin-bottom:10px;">Or jump in as a specific doctor:</p>
      <div class="sx" style="display:flex;gap:8px;">
        <button onclick="quickLogin(0)" style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.8);border-radius:10px;padding:8px 13px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;">Dr. Sharma</button>
        <button onclick="quickLogin(1)" style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.8);border-radius:10px;padding:8px 13px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;">Dr. Kapoor</button>
        <button onclick="quickLogin(2)" style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.8);border-radius:10px;padding:8px 13px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;">Dr. Mehta</button>
        <button onclick="quickLogin(3)" style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.8);border-radius:10px;padding:8px 13px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;">Dr. Rao</button>
        <button onclick="quickLogin(4)" style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.8);border-radius:10px;padding:8px 13px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;">Dr. Joshi</button>
      </div>
    </div>
  </div>
</div>
</div>

<!-- ═══════════════════════════════════════
     SCREEN 3: DOCTOR DASHBOARD
═══════════════════════════════════════ -->
<div class="screen" id="s-docdash">
  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-inner">
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:36px;height:36px;border-radius:11px;background:linear-gradient(135deg,#0D9488,#0891B2);display:flex;align-items:center;justify-content:center;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        </div>
        <div>
          <div id="dd-name" style="font-size:13px;font-weight:800;color:#0F172A;">Dr. Name</div>
          <div id="dd-spec" style="font-size:11px;color:#64748B;">Specialty</div>
        </div>
      </div>
      <button onclick="doDocLogout()" style="background:#FEE2E2;color:#DC2626;border:none;border-radius:10px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;">Logout</button>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="doc-tab-bar">
    <div class="sx" style="max-width:520px;margin:0 auto;padding:10px 16px 0;display:flex;gap:6px;padding-bottom:10px;">
      <button class="chip chip-on doc-tab" data-tab="overview" onclick="switchTab('overview',this)">📊 Overview</button>
      <button class="chip chip-off doc-tab" data-tab="queue" onclick="switchTab('queue',this)">👥 Queue</button>
      <button class="chip chip-off doc-tab" data-tab="appts" onclick="switchTab('appts',this)">📅 Appointments</button>
      <button class="chip chip-off doc-tab" data-tab="analytics" onclick="switchTab('analytics',this)">📈 Analytics</button>
      <button class="chip chip-off doc-tab" data-tab="settings" onclick="switchTab('settings',this)">⚙️ Settings</button>
    </div>
  </div>

  <div class="content" id="dd-content" style="padding-top:12px;"></div>
</div>

<!-- ═══════════════════════════════════════
     SCREEN 4: PATIENT APP
═══════════════════════════════════════ -->
<div class="screen" id="s-patient">
  <!-- Top Bar -->
  <div class="topbar" id="pat-topbar">
    <div class="topbar-inner">
      <div style="display:flex;align-items:center;gap:8px;">
        <div style="width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#2563EB,#0284C7);display:flex;align-items:center;justify-content:center;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3"/><path d="M8 15v1a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6v-4"/><circle cx="20" cy="10" r="2"/></svg>
        </div>
        <span style="font-size:17px;font-weight:900;color:#0F172A;letter-spacing:-0.5px;">Doc<span style="color:#2563EB;">Queue</span></span>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button onclick="patNav('notifications')" style="position:relative;width:34px;height:34px;border-radius:10px;border:none;background:#F1F5F9;cursor:pointer;display:flex;align-items:center;justify-content:center;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span id="notif-dot" style="position:absolute;top:7px;right:7px;width:6px;height:6px;background:#EF4444;border-radius:50%;border:1.5px solid white;"></span>
        </button>
        <div onclick="patNav('profile')" style="width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#2563EB,#0284C7);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;font-weight:800;color:white;">RK</div>
      </div>
    </div>
  </div>

  <!-- Patient Content (single container, we swap innerHTML) -->
  <div id="pat-content"></div>

  <!-- Bottom Nav -->
  <nav class="botnav">
    <div class="botnav-inner">
      <button class="nb on" id="pnav-home" onclick="patNav('home')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Home</span>
      </button>
      <button class="nb" id="pnav-myqueue" onclick="patNav('myqueue')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>My Queue</span>
      </button>
      <button class="nb" id="pnav-notifications" onclick="patNav('notifications')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span>Alerts</span>
      </button>
      <button class="nb" id="pnav-profile" onclick="patNav('profile')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profile</span>
      </button>
    </div>
  </nav>
</div>

<!-- Global modal & toast containers -->
<div id="modal-root"></div>
<div class="toast-wrap" id="toast-root"></div>

  <script src="script.js"></script>
</body>
</html>
